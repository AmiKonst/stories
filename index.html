<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steps Player</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
}

video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.controls {
    position: fixed;
    bottom: 30px;
    right: 100px;
    display: flex;
    gap: 20px;
    background: #000;
    padding: 12px;
    border-radius: 12px;
    z-index: 111;
}

button {
    padding: 12px 24px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>
<body>

<video id="video" loop playsinline></video>

<div class="controls">
    <button id="startBtn">Начать</button>
    <button id="prevBtn">Назад</button>
    <button id="nextBtn">Вперед</button>
</div>

<script>
const steps = [
    { video: '1-00.mp4', audio: 'light-01.mp3' },
    { video: '1-00-01.mp4', audio: 'dark-01.mp3' },
    { video: '1-00-02.mp4' },
    { video: '1-01.mp4' },
    { video: '1-02.mp4' },
    { video: '1-03.mp4' },
    { video: '1-03-01.mp4' },
    { video: '1-04.mp4' },
    { video: '1-04-01.mp4' },
    { video: '1-05-01.mp4', audio: 'dark-02.mp3' },
    { video: '1-05.mp4' },
    { video: '1-05-02.mp4' },
    { video: '1-05-03.mp4', audio: 'light-03.mp3' },
    { video: '1-07.mp4' },
    { video: '1-06.mp4' },
    { video: '2-00.mp4', audio: 'dark-01.mp3' },
    { video: '2-01.mp4' },
    { video: '2-02.mp4' },
    { video: '2-02-01.mp4' },
    { video: '2-02-02.mp4' },
    { video: '2-03.mp4' },
    { video: '2-03-02.mp4' },
    { video: '2-03-01.mp4' },
    { video: '2-04.mp4' },
    { video: '2-05.mp4' },
    { video: '2-06.mp4' },
    { video: '2-06-01.mp4' },
    { video: '2-06-02.mp4' },
    { video: '2-06-03.mp4' },
    { video: '2-06-04.mp4' },
    { video: '2-07.mp4' },
    { video: '2-07-01.mp4' },
    { video: '2-07-02.mp4' },
    { video: '2-07-03.mp4' },
    { video: '2-09-02-01.mp4', audio: 'dark-04.mp3' },
    { video: '2-09.mp4' },
    { video: '2-09-01.mp4', audio: 'light-04.mp3' },
    { video: '2-09-02.mp4' },
    { video: '2-09-02-02.mp4' },
    { video: '2-09-03.mp4' },
    { video: '2-09-04.mp4' },
    { video: '3-06.mp4', audio: 'light-02.mp3' }
];

let step = -1;

const videosPath = '/stories/videos/';
const audioPath = '/stories/music/';

const videoEl = document.getElementById('video');

/* ------------------ WebAudio ------------------ */

let audioContext;
let currentSource = null;
let currentBuffer = null;

function initAudio() {
    if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
}

async function playAudio(file) {
    if (!audioContext) return;

    // Остановить предыдущий трек
    if (currentSource) {
        currentSource.stop();
        currentSource.disconnect();
    }

    const response = await fetch(audioPath + file);
    const arrayBuffer = await response.arrayBuffer();
    currentBuffer = await audioContext.decodeAudioData(arrayBuffer);

    const source = audioContext.createBufferSource();
    source.buffer = currentBuffer;
    source.loop = true;
    source.connect(audioContext.destination);
    source.start(0);

    currentSource = source;
}

/* ------------------ Логика шагов ------------------ */

function loadStep(index) {
    if (index < 0 || index >= steps.length) return;

    step = index;
    const current = steps[step];

    // Видео
    videoEl.src = videosPath + current.video;
    videoEl.load();

    videoEl.onloadedmetadata = () => {
        videoEl.playbackRate = 0.5;
        videoEl.play().catch(() => {});
    };

    // Аудио только если указано
    if (current.audio) {
        playAudio(current.audio);
    }
}

/* ------------------ Кнопки ------------------ */

document.getElementById('startBtn').addEventListener('click', async () => {
    if (step === -1) {
        initAudio();
        await audioContext.resume(); // обязательно для LG
        loadStep(0);
    }
});

document.getElementById('nextBtn').addEventListener('click', () => {
    if (step < steps.length - 1) {
        loadStep(step + 1);
    }
});

document.getElementById('prevBtn').addEventListener('click', () => {
    if (step > 0) {
        loadStep(step - 1);
    }
});

// Поддержка кнопки OK
document.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter' && step === -1) {
        initAudio();
        await audioContext.resume();
        loadStep(0);
    }
});
</script>

</body>
</html>
